<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/rowdycup-logo.svg" />
    <!-- Brand navy; swapped to the festive red for Christmas Classic at runtime (see Layout). -->
    <meta name="theme-color" content="#132448" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rowdy Cup</title>

    <!-- Preconnect to Firebase origins for faster initial load -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://apis.google.com" crossorigin />
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://apis.google.com" />

    <!-- Google Fonts: preconnect + non-blocking link (moved out of CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    />

    <!-- iOS PWA support -->
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <!-- Standardized mobile web app meta (keep apple-prefixed for older iOS compatibility) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent lets the dark gradient header bleed under the status bar (white text) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rowdy Cup" />

    <!-- Cold-start splash: paints immediately (before any JS parses) and is
         replaced when React mounts into #root. Keeps startup from being a
         blank white screen on slow networks / cold caches. -->
    <style>
      .boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #132448;
      }
      .boot-splash img {
        width: 96px;
        height: 96px;
      }
      .boot-splash-spinner {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #fff;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-splash-spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash" aria-hidden="true">
        <img src="/images/rowdycup-logo.svg" alt="" />
        <div class="boot-splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
