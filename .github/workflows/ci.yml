name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (rowdy-ui)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rowdy-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rowdy-ui/package-lock.json
      - run: npm ci
      - run: npm run build
      # Non-blocking until the ~129 pre-existing no-explicit-any errors are cleaned up
      - run: npm run lint
        continue-on-error: true
      - run: npm run test:run

  functions:
    name: Cloud Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:run
